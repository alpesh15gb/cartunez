version: '3.8'

services:
  medusa-backend:
    build: 
      context: ./medusa-backend
      dockerfile: Dockerfile
    container_name: cartunez-medusa
    ports:
      - "9001:9000"
    environment:
      - DATABASE_URL=postgres://postgres:password@postgres:5432/medusa?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
      - JWT_SECRET=supersecret
      - COOKIE_SECRET=supersecret
      - STORE_CORS=http://localhost:3001,http://cartunez.in,https://cartunez.in
      - ADMIN_CORS=http://localhost:9001,http://cartunez.in,https://cartunez.in
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    volumes:
      - ./nhone_products.json:/app/nhone_products.json
      - ./names_v2.json:/app/names_v2.json
      - /app/medusa-backend/node_modules

  storefront:
    build:
      context: ./storefront
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_MEDUSA_BACKEND_URL=https://cartunez.in
        - NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=pk_8ac102cdd2ed35a8728f98273db6a69a0bb288eeee956d9fc0b593501bab8900
    container_name: cartunez-storefront
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_MEDUSA_BACKEND_URL=https://cartunez.in
      - NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=pk_8ac102cdd2ed35a8728f98273db6a69a0bb288eeee956d9fc0b593501bab8900
    depends_on:
      - medusa-backend
    restart: unless-stopped
    volumes:
      - /app/storefront/node_modules

  postgres:
    image: postgres:15
    container_name: cartunez-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=medusa
    ports:
      - "5440:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: cartunez-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
