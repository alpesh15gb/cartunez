services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cartunez
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ../backend
    restart: always
    ports:
      - "127.0.0.1:5050:5000"
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/cartunez?schema=public
      JWT_SECRET: your_jwt_secret_here
      PORT: 5000
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      SHIPROCKET_EMAIL: ${SHIPROCKET_EMAIL}
      SHIPROCKET_PASSWORD: ${SHIPROCKET_PASSWORD}
    volumes:
      - ../backend/public/uploads:/app/public/uploads
    depends_on:
      - db

  web:
    build: ../web
    restart: always
    ports:
      - "127.0.0.1:3030:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      INTERNAL_API_URL: http://backend:5000/api
    depends_on:
      - backend

volumes:
  postgres_data:
